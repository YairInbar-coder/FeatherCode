name: CMake Build Matrix

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  build:
    name: Build on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    
    strategy:
      # Prevent a failure on one OS from stopping the other builds
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]

    steps:
    # 1. Downloads your code from the repository into the runner
    - name: Checkout repository
      uses: actions/checkout@v4

    # 2. Installs CMake and compilers automatically (built-in on GitHub runners)
    - name: Configure CMake
      run: cmake -B ${{github.workspace}}/build -DCMAKE_BUILD_TYPE=Release

    # 3. Compiles the project using the generated build files
    - name: Build project
      run: cmake --build ${{github.workspace}}/build --config Release

    # 4. Optional: Runs your tests if you use CTest
    - name: Run Tests
      working-directory: ${{github.workspace}}/build
      run: ctest -C Release
